---
- name: Install pip (Ubuntu >= 22.04)
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - ansible_facts['distribution_version'] is version('22.04', '>=')
  ansible.builtin.apt:
    name: python3-pip
    update_cache: true

- name: Install pip (Ubuntu < 22.04)
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - ansible_facts['distribution_version'] is version('22.04', '<')
  ansible.builtin.shell: |
    apt update
    apt install -y python3-pip
  register: output_install_pip
  changed_when: "'0 upgraded, 0 newly installed' not in output_install_pip.stdout"
  retries: 3

- name: Install pip-kubernetes (Ubuntu >= 24.04)
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - ansible_facts['distribution_version'] is version('24.04', '>=')
  ansible.builtin.apt:
    name: python3-kubernetes

- name: Install pip-kubernetes (Ubuntu < 24.04)
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - ansible_facts['distribution_version'] is version('24.04', '<')
  ansible.builtin.pip:
    name: kubernetes
